<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sir Trading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text" font-family="Times New Roman">Sir</span>
        <span class="logo-text">Trading</span>
      </div>
      <nav class="nav-menu">
        <a href="/" class="nav-link active">Dashboard</a>
        <a href="/calendar.html" class="nav-link">Calendar</a>
      </nav>
      <button class="btn btn-primary" id="openModalBtn">+ New Trade</button>
    </div>
  </header>

  <!-- Stats Dashboard -->
  <main class="container">
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card" id="statWinRate">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statPnL">
        <div class="stat-label">Total P&L</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statTrades">
        <div class="stat-label">Total Trades</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statRR">
        <div class="stat-label">Avg Risk/Reward</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statAvgWin">
        <div class="stat-label">Avg Win</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statAvgLoss">
        <div class="stat-label">Avg Loss</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statPF">
        <div class="stat-label">Profit Factor</div>
        <div class="stat-value">—</div>
      </div>
      <div class="stat-card" id="statWL">
        <div class="stat-label">W / L</div>
        <div class="stat-value">—</div>
      </div>
    </section>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <h2 class="section-title">Trade History</h2>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="win">Wins</button>
        <button class="filter-btn" data-filter="loss">Losses</button>
        <button class="filter-btn" data-filter="breakeven">Break Even</button>
      </div>
    </div>

    <!-- Trade List -->
    <div class="trade-list" id="tradeList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <p>No trades yet. Log your first trade to get started.</p>
      </div>
    </div>
  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">New Trade</h3>
        <button class="modal-close" id="closeModalBtn">✕</button>
      </div>

      <form class="modal-form" id="tradeForm">
        <input type="hidden" id="tradeId" />

        <div id="step1">
          <div class="form-row">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="date" required />
            </div>
            <div class="form-group">
              <label>Symbol / Pair</label>
              <input type="text" id="symbol" placeholder="e.g. EURUSD, AAPL" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Outcome</label>
              <div class="outcome-toggle" id="outcomeToggle">
                <button type="button" class="outcome-btn win active" data-value="win"><svg width="14" height="14"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle; margin-bottom: 2px;">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg> Win</button>
                <button type="button" class="outcome-btn loss" data-value="loss"><svg width="14" height="14"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle; margin-bottom: 2px;">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg> Loss</button>
                <button type="button" class="outcome-btn breakeven" data-value="breakeven"><svg width="14" height="14"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle; margin-bottom: 2px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                  </svg> Break Even</button>
              </div>
              <input type="hidden" id="outcome" value="win" />
            </div>
            <div class="form-group" id="pnlGroup">
              <label>P&amp;L ($)</label>
              <input type="number" id="pnl" placeholder="e.g. 150 or -80" step="0.01" />
            </div>
          </div>

          <!-- Price fields: hidden when break-even -->
          <div id="priceFields">
            <div class="form-row">
              <div class="form-group">
                <label>Entry Price</label>
                <input type="number" id="entryPrice" placeholder="0.00" step="0.0001" />
              </div>
              <div class="form-group">
                <label>Exit Price</label>
                <input type="number" id="exitPrice" placeholder="0.00" step="0.0001" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Stop Loss Price</label>
                <input type="number" id="stopLoss" placeholder="0.00" step="0.0001" />
              </div>
              <div class="form-group">
                <label>Take Profit Price</label>
                <input type="number" id="takeProfit" placeholder="0.00" step="0.0001" />
              </div>
            </div>

            <div class="form-group full">
              <label>Trade Scale (Lot Size / Units)</label>
              <div class="scale-row">
                <input type="range" id="scaleRange" min="0.01" max="10" step="0.01" value="1" />
                <input type="number" id="scaleValue" min="0.01" max="10" step="0.01" value="1" class="scale-number" />
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Position Size ($)</label>
              <input type="number" id="positionSize" placeholder="e.g. 1000" step="0.01" />
            </div>
            <div class="form-group">
              <label>Risk / Reward Ratio</label>
              <input type="number" id="riskReward" placeholder="e.g. 2.5" step="0.01" />
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
            <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
          </div>
        </div>

        <div id="step2" style="display: none;">
          <div class="form-group full">
            <label>Mentality & Mindset</label>
            <textarea id="mentality" rows="2"
              placeholder="How were you feeling? Were you calm, fearful, greedy?"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>✅ Pros / What went well</label>
              <textarea id="pros" rows="3" placeholder="What did you do right?"></textarea>
            </div>
            <div class="form-group">
              <label>❌ Cons / What went wrong</label>
              <textarea id="cons" rows="3" placeholder="What could be improved?"></textarea>
            </div>
          </div>

          <div class="form-group full">
            <label>Additional Notes</label>
            <textarea id="notes" rows="2" placeholder="Any other observations, setups, market conditions..."></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="backBtn">Back</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">Save Trade</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Trade Detail Modal -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal modal-detail" id="detailModal">
      <div class="modal-header">
        <h3 class="modal-title" id="detailTitle">Trade Detail</h3>
        <button class="modal-close" id="closeDetailBtn">✕</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
      <div class="form-actions">
        <button class="btn btn-ghost btn-danger" id="detailDeleteBtn">Delete</button>
        <button class="btn btn-primary" id="detailEditBtn">Edit Trade</button>
      </div>
    </div>
  </div>

  <script src="/js/methods.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
